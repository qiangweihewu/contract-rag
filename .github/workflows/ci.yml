name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: uv sync --extra dev --extra api
      - name: Run tests
        run: uv run pytest -q

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Placeholder README for the image build
        # The Dockerfile copies README.md; create a stub if the checkout lacks one.
        run: test -f README.md || echo "# contract-rag" > README.md
      - name: Build image
        run: docker build -t contract-rag .
