[[negatives]]
text = "我们复现了 DAPEI 风格的\"定义注入\"检索增强手法：在哈希与语义两种向量模型下，混合检索均无任何提升（哈希模型 hybrid {{ dapei_hybrid_hashing }} → {{ dapei_hybrid_hashing }}，持平；语义模型下仅注入稠密侧的结果与基线逐项完全一致，hybrid {{ dapei_hybrid_semantic }} → {{ dapei_hybrid_semantic }}）；全量注入反而拖累 BM25（{{ dapei_bm25_before }} → {{ dapei_bm25_after }}），并把语义模型的 hybrid 拉低到 {{ dapei_hybrid_semantic_full_inject }}。我们保留了用于分析的埋点，但没有采用这项技术。"

[[negatives]]
text = "我们试验过一个替代的本地 OCR 引擎（FrankenOCR）：字段 F1 打平，速度却慢了 {{ frankenocr_slowdown }}，而且在被切碎的扫描件上会产生幻觉文本。最终未采用。"

[[negatives]]
text = "我们自己的质量评分也有盲区：在 FinCriticalED 上，{{ fincritical_omission_rate }} 的专家标注事实从 OCR 输出中消失，而评分依然显示 {{ fincritical_quality_at_omission }}。OCR 置信度同样无法标记它——被遗漏的事实根本不产生任何文本块，而不是一个低置信度的块。我们选择把这个差距公开测量，而不是藏起来。"

[[faq]]
q = "为什么脏合同 PDF 会破坏 RAG 检索和抽取？"
a = "乱码（Mojibake）、单词中间被换行拆开、每页重复的页眉，以及近似重复的文本块，都会同时污染分块检索并干扰结构化抽取——模型检索到的是噪声，引用的也是错误片段。在建索引或抽取之前，先清洗成一个有类型的文档 IR，是从根源解决问题，而不是靠更大的模型硬扛。"

[[faq]]
q = "在真实合同上（而不是合成 demo 上）抽取准确率如何？"
a = "在公开的 CUAD 基准（40 份真实合同）上，确定性规则抽取器字段 F1 达到 {{ cuad_rule_f1 }}（95% 置信区间 {{ cuad_rule_f1_ci }}），溯源准确率 {{ cuad_rule_source_acc }}。在真实的 SEC EDGAR NDA（Kleister-NDA）上，同一套方法达到 {{ kleister_f1_improved }}，而我们自己的合成金标集分数是 {{ synthetic_nda_f1 }}——这个合成与真实数据之间的差距，我们选择公开发布，而不是隐藏。"

[[faq]]
q = "能处理扫描件、以及数字件+扫描件混合的合同吗？"
a = "可以。文本覆盖率探测会为每一页路由到合适的解析器（原生数字文本 vs OCR）——这一点很重要：{{ edith_misroute_docs }} 的真实混合文档在整份文档级路由下至少有一页会路由错误，这正是我们把路由做到按页而非按文档粒度的原因。扫描件的签名检测同样已经构建并测量（Tobacco800：F1 {{ tobacco800_signature_f1 }}）。"

[[faq]]
q = "\"可溯源、经过验证\"具体是什么意思？"
a = "每一个抽取出的值都必须是其引用文本块（source_block_id）的原文片段——溯源关系由结构强制保证，而不是靠提示词承诺。verify() 守卫会把低置信度或无法溯源的字段挂起，转交人工复核，而不是悄悄给出一个可能错误的答案。"

[[faq]]
q = "抽取出的事实能对接进我们的 CLM（Salesforce、Ironclad）吗？"
a = "可以——CSV/JSON 导出会携带 doc_id、字段名、值、source_block_id、置信度、风险分级，以及一个 verified 标记，并提供 Salesforce/Ironclad 的字段名最佳对齐映射（供导入参考，并非官方 schema）。"

[[faq]]
q = "为什么要公开负面结果，而不是只展示成功的那部分？"
a = "因为只展示成功数字的供应商，是在要求你相信营销话术，而不是证据。我们测量过 DAPEI 风格的定义注入，结果没有帮助；我们试验过一个替代 OCR 引擎，最终没有采用；我们测量过自己的质量评分对 OCR 遗漏的盲区。这三项负面结果都和其他有效的结果并列展示在这个页面上。"
