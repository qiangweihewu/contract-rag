[[pillars]]
title = "解析路由，覆盖真实扫描件"
body = "按文本覆盖率探测每份文档并路由到合适的解析器（docling / VLM / paddleOCR）；按页路由能识别整份文档级路由会漏掉的\"数字件+扫描件\"混合合同——实测：EDiTh 混合文档中有 {{ edith_misroute_docs }} 会有至少一页路由错误（整份路由时）。"

[[pillars]]
title = "可解释的质量评分 + 人工复核"
body = "一个可解释的加权评分（乱码、表格完整性、空白块、OCR 置信度）会标出需要人工复核的内容——我们也如实说明它看不到什么：置信度无法标记遗漏，因为被遗漏的事实根本不会产生任何文本块，而不是一个低置信度的块。我们已经测量过这个盲区，并为此构建了一个基于几何墨迹覆盖率的信号。"

[[pillars]]
title = "可溯源抽取，经过验证，可直接对接 CLM"
body = "每一个抽取出的值，都必须是其引用源文本块的原文片段——溯源关系由结构保证，而非靠提示词承诺。verify() 会把低置信度或无法溯源的字段挂起待人工复核，同一批事实还能导出为 CSV/JSON，并提供 Salesforce/Ironclad 的字段名最佳对齐映射。"

