[[pillars]]
title = "Parse router, including real scans"
body = "Text-coverage probing routes each document (docling / VLM / paddleOCR); per-page routing catches mixed digital+scanned contracts a whole-document router misses -- measured: {{ edith_misroute_docs }} of mixed EDiTh documents misroute at least one page under single-route parsing."

[[pillars]]
title = "Explainable quality score + HITL"
body = "A weighted, explainable score (garble, table integrity, empty blocks, OCR confidence) flags what needs human review -- and we tell you where it can't see: confidence can't flag omissions, because an omitted fact produces no block at all, not a low-confidence one. We measured that gap and built a geometric coverage signal for it."

[[pillars]]
title = "Sourced extraction, verified, CLM-ready"
body = "Every extracted value is a literal span of its cited source block -- attribution holds by construction. verify() quarantines low-confidence or unattributed fields for review, and the same facts export straight to CSV/JSON with a best-effort Salesforce/Ironclad field mapping."

