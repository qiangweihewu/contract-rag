[[negatives]]
text = "We reproduced DAPEI-style definition injection for retrieval: zero lift through hybrid under both a hashing embedder (hybrid {{ dapei_hybrid_hashing }} → {{ dapei_hybrid_hashing }}, flat) and a semantic embedder (dense-only injection cell-for-cell identical to baseline, hybrid {{ dapei_hybrid_semantic }} → {{ dapei_hybrid_semantic }}); full injection actually hurt BM25 ({{ dapei_bm25_before }} → {{ dapei_bm25_after }}) and dragged semantic hybrid to {{ dapei_hybrid_semantic_full_inject }}. We shipped the instrumentation, not the technique."

[[negatives]]
text = "We spiked an alternative local OCR engine (FrankenOCR): parity field-F1, {{ frankenocr_slowdown }} slower, and it hallucinates text on shredded scans. Not adopted."

[[negatives]]
text = "Our own quality score has a blind spot: on FinCriticalED, {{ fincritical_omission_rate }} of expert facts vanish from OCR output while the score still reads {{ fincritical_quality_at_omission }}. OCR confidence can't flag it either -- an omitted fact produces no block at all, not a low-confidence one. That gap is why we measure it in the open instead of hiding it."

[[faq]]
q = "Why does a dirty contract PDF break RAG retrieval and extraction?"
a = "Mojibake, mid-word hyphenation, repeated page headers, and near-duplicate blocks poison chunk retrieval and confuse structured extraction -- the model retrieves noise and cites the wrong span. Cleaning to a typed Document IR before indexing or extracting fixes the root cause instead of papering over it with a bigger model."

[[faq]]
q = "How accurate is extraction on real contracts, not a synthetic demo?"
a = "On the public CUAD benchmark (40 real contracts) the deterministic rule extractor reaches field-F1 {{ cuad_rule_f1 }} (95% CI {{ cuad_rule_f1_ci }}) with source-accuracy {{ cuad_rule_source_acc }}. On real SEC EDGAR NDAs (Kleister-NDA) the same approach reaches {{ kleister_f1_improved }}, versus {{ synthetic_nda_f1 }} on our own synthetic golden set -- the gap between synthetic and real-document numbers, published rather than hidden."

[[faq]]
q = "Does this handle scanned and mixed digital/scanned contracts?"
a = "Yes. A text-coverage probe routes each page to the right parser (native-digital vs OCR), which matters: {{ edith_misroute_docs }} of real mixed digital+scanned documents misroute at least one page under whole-document routing, which is why routing is per-page, not per-document. Scanned-page signature detection is also built and measured (Tobacco800: F1 {{ tobacco800_signature_f1 }})."

[[faq]]
q = "What does 'sourced and verified' actually mean?"
a = "Every extracted value is required to be a literal span of the block it cites (source_block_id) -- attribution holds by construction, not by prompting. A verify() guard quarantines low-confidence or unattributed fields for human review instead of shipping a silently wrong answer."

[[faq]]
q = "Can extracted facts flow into our CLM (Salesforce, Ironclad)?"
a = "Yes -- a CSV/JSON export carries doc_id, field name, value, source_block_id, confidence, risk tier, and a verified flag, with a best-effort Salesforce/Ironclad field-name mapping for import convenience (not an official schema)."

[[faq]]
q = "Why do you publish negative results instead of just the wins?"
a = "Because a vendor that only shows you the numbers that worked is asking you to trust marketing, not evidence. We measured DAPEI-style definition injection and it didn't help; we spiked an alternative OCR engine and didn't adopt it; we measured our own quality score's blind spot to OCR omissions. All three are on this page, next to the results that did work."
