# Point-in-time measured results, injected into content/kleister-nda.{en,zh}.md
# at site-build time via `load_static_tokens` (single source of truth for both
# language versions). These numbers are NOT recomputed at build time: Kleister-NDA
# states no explicit license, so the dataset is never committed and the eval is
# gated on KLEISTER_DIR; the structured-decoding runs need a GPU rig. Reproduce:
#   KLEISTER_DIR=... python -m contract_rag.verticals.nda.kleister --eval
#   scripts/measure_constrained.py  (Ollama qwen2.5:32b-instruct, 40-doc CUAD set)
# All values as strings so the published formatting is exact.

kleister_measured_date = "2026-07-06"
kleister_n_docs = "40"

# Kleister-NDA blended field-F1, rule extractor (initial = rules tuned on the
# synthetic set; improved = after targeted rule fixes). Source-accuracy both rounds.
