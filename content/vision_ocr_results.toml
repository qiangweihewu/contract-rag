# cached FinCriticalED IRs; measure_vision_ocr_results/crosscheck.json, run 2026-07-14).
# Pre-registered bar: fact-level flag-recall >= 0.5 AND page-level false-alarm <= 0.2.
vo_cc_bar = "recall ≥ 50% @ false-alarm ≤ 20%"
vo_cc_n_omissions = "38"
vo_cc_recall = "0.184"
vo_cc_false_alarm = "0.152"
